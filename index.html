<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>HORA System s.r.o. - Software development</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F1E8;
      --ink: #111;
      --accent: #D94A2B;
      --rule: rgba(17, 17, 17, 0.16);
      --muted: rgba(17, 17, 17, 0.62);
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
    }

    /* Top bar ------------------------------------------------------------- */
    .nav {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 28px 56px;
      border-bottom: 1px solid var(--rule);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .logo-word {
      font-family: var(--serif);
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .nav-mail {
      font-family: var(--mono);
      font-size: 13px;
      text-decoration: none;
    }

    .nav-mail .arrow {
      opacity: 0.5;
      margin-left: 6px;
    }

    /* Hero ---------------------------------------------------------------- */
    .hero {
      flex: 1;
      padding: 120px 56px 96px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 96px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .eyebrow .dot {
      width: 7px;
      height: 7px;
      border-radius: 10px;
      background: var(--accent);
      display: inline-block;
    }

    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 104px;
      line-height: 0.96;
      letter-spacing: -0.025em;
      margin: 0;
      text-wrap: balance;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .lede {
      margin-top: 36px;
      max-width: 520px;
      font-size: 19px;
      line-height: 1.5;
      color: var(--muted);
      text-wrap: pretty;
    }

    .cta-row {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-top: 48px;
    }

    .cta-primary {
      background: var(--ink);
      color: var(--bg);
      padding: 16px 26px;
      font-size: 15px;
      text-decoration: none;
      letter-spacing: -0.005em;
    }

    .cta-primary:hover {
      background: var(--accent);
    }

    /* Details column ------------------------------------------------------ */
    .details {
      padding-top: 16px;
      font-family: var(--mono);
    }

    .detail {
      padding: 22px 0;
      border-top: 1px solid var(--rule);
    }

    .detail:last-child {
      border-bottom: 1px solid var(--rule);
    }

    .detail-k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .detail-v {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
    }

    .detail-v a {
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: border-color .15s;
    }

    .detail-v a:hover {
      border-bottom-color: var(--ink);
    }

    /* Footer -------------------------------------------------------------- */
    .foot {
      display: flex;
      justify-content: space-between;
      padding: 24px 56px;
      border-top: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Responsive ---------------------------------------------------------- */
    @media (max-width: 960px) {
      .nav {
        padding: 22px 28px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 56px;
        padding: 64px 28px 56px;
      }

      h1 {
        font-size: 64px;
      }

      .foot {
        padding: 20px 28px;
        flex-direction: column;
        gap: 6px;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 48px;
        letter-spacing: -0.02em;
      }

      .nav-mail {
        font-size: 12px;
      }

      .cta-row {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }

      .cta-primary {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <header class="nav">
    <a class="logo" href="/">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.2"></circle>
        <path d="M11 4 V11 L15.5 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
      </svg>
      <span class="logo-word">HORA System</span>
    </a>
  </header>

  <main class="hero">
    <div>
      <h1>
        Software<br />
        <em>development.</em>
      </h1>
      <p class="lede">
        Tvoříme software. Pečlivě. Aby byl k přečtení i po pěti letech.
      </p>
      <div class="cta-row">
        <a class="cta-primary">
          Pošlete nám zprávu
        </a>
      </div>
    </div>

    <aside class="details">
      <div class="detail">
        <div class="detail-k">Email</div>
        <div class="detail-v">
          <a><span></span>email</span></a>
        </div>
      </div>
      <div class="detail">
        <div class="detail-k">Addresa</div>
        <div class="detail-v">
          HORA System s.r.o.
          Příčná 1892/4<br />
          Nové Město, 110 00<br />
          Praha 1, Česká republika
        </div>
      </div>
      <div class="detail">
        <div class="detail-k">Registrace</div>
        <div class="detail-v">
          <a href="https://verejnerejstriky.msp.gov.cz/en/vypis/1303109" target="_blank" rel="noopener">
            Veřejný rejstřík ↗
          </a>
        </div>
      </div>
    </aside>
  </main>

  <footer class="foot">
    <span>© 2026 HORA System s.r.o.</span>
    <span>Praha, Česká republika</span>
  </footer>
</body>

</html>
